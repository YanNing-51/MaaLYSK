name: Alist Distribution

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "版本号（填写后直接分发该版本，忽略下方模式选择）"
        required: false
        default: ""
        type: string
      version_mode:
        description: "选择分发模式（仅在上方 tag 为空时生效）"
        required: false
        default: "latest"
        type: choice
        options:
          - "latest"
          - "latest-beta"
          - "latest-stable"
          - "manual"

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      distribute_tag: ${{ steps.resolve-tag.outputs.tag }}
      source: ${{ steps.resolve-tag.outputs.source }}
      need_approval: ${{ steps.resolve-tag.outputs.need_approval }}
    steps:
      - name: Resolve tag to distribute
        id: resolve-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_INPUT="${{ github.event.inputs.tag }}"
          VERSION_MODE="${{ github.event.inputs.version_mode }}"

          if [ -n "$TAG_INPUT" ]; then
            # 填了 tag 就直接用（install.yml 传入 或 手动填写）
            TAG="$TAG_INPUT"
            if [ -z "$VERSION_MODE" ]; then
              SOURCE="install-workflow"
              NEED_APPROVAL="true"
              echo "✅ 来自 install workflow 的版本: $TAG"
            else
              SOURCE="manual-tag"
              NEED_APPROVAL="false"
              echo "✅ 手动指定版本: $TAG"
            fi
          elif [ -n "$VERSION_MODE" ]; then
            # 新逻辑：使用下拉列表模式
            case "$VERSION_MODE" in
              "latest")
                # 最新版（排除 alpha）
                LATEST_TAG=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                  "https://api.github.com/repos/${{ github.repository }}/releases?per_page=50" | \
                  jq -r '.[] | select(.tag_name | contains("alpha") | not) | .tag_name' | \
                  head -1)
                TAG="$LATEST_TAG"
                SOURCE="manual-latest"
                NEED_APPROVAL="false"
                echo "✅ 最新版本（排除 alpha）: $TAG"
                ;;
              "latest-beta")
                # 公测版最新（排除 alpha）
                LATEST_TAG=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                  "https://api.github.com/repos/${{ github.repository }}/releases?per_page=50" | \
                  jq -r '.[] | select(.tag_name | contains("beta") and (contains("alpha") | not)) | .tag_name' | \
                  head -1)
                TAG="$LATEST_TAG"
                SOURCE="manual-latest-beta"
                NEED_APPROVAL="false"
                echo "✅ 最新公测版（排除 alpha）: $TAG"
                ;;
              "latest-stable")
                # 正式版最新（排除 alpha）
                LATEST_TAG=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
                  "https://api.github.com/repos/${{ github.repository }}/releases?per_page=50" | \
                  jq -r '.[] | select(.tag_name | contains("beta") or contains("alpha") | not) | .tag_name' | \
                  head -1)
                TAG="$LATEST_TAG"
                SOURCE="manual-latest-stable"
                NEED_APPROVAL="false"
                echo "✅ 最新正式版（排除 alpha）: $TAG"
                ;;
              "manual")
                # 手动输入 tag（允许 alpha）
                if [ -z "$TAG_INPUT" ]; then
                  echo "❌ 选择了 manual 模式但未在 tag 字段填写版本号"
                  exit 1
                fi
                TAG="$TAG_INPUT"
                SOURCE="manual-input"
                NEED_APPROVAL="false"
                echo "✅ 手动输入版本（允许 alpha）: $TAG"
                ;;
              *)
                echo "❌ 未知的 version_mode: $VERSION_MODE"
                exit 1
                ;;
            esac
          else
            # 原有逻辑：手动触发但未输入 tag，自动获取最新版 - 不需要批准
            LATEST_TAG=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases?per_page=1" | \
              jq -r '.[0].tag_name')
            TAG="$LATEST_TAG"
            SOURCE="auto-latest"
            NEED_APPROVAL="false"
            echo "✅ 未输入版本，自动获取最新版: $TAG"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "source=$SOURCE" >> $GITHUB_OUTPUT
          echo "need_approval=$NEED_APPROVAL" >> $GITHUB_OUTPUT

  # 只有需要确认时才触发
  confirm:
    runs-on: ubuntu-latest
    needs: get-version
    if: needs.get-version.outputs.need_approval == 'true'
    environment:
      name: alist-release-confirmation
    steps:
      - name: Display release info
        run: |
          echo "## 🚀 新版本发布，需要确认" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 信息 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 分发版本 | ${{ needs.get-version.outputs.distribute_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 触发源 | ${{ needs.get-version.outputs.source }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**说明:** 请确认是否将上述版本分发到 Alist 云盘"

  distribute:
    runs-on: ubuntu-latest
    needs: [get-version, confirm]
    # 只有需要批准时，distribute 才需要等待 confirm 完成
    # 不需要批准时，直接执行
    if: always() && (needs.get-version.outputs.need_approval == 'false' || needs.confirm.result == 'success')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for release assets to be ready
        run: |
          echo "等待 release assets 准备就绪..."
          for i in {1..30}; do
            ASSET_COUNT=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ needs.get-version.outputs.distribute_tag }}" | \
              jq '.assets | length')
            
            if [ "$ASSET_COUNT" -gt 0 ]; then
              echo "✅ 找到 $ASSET_COUNT 个 assets，开始分发"
              break
            fi
            echo "等待中... ($i/30)"
            sleep 2
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show distribution info
        run: |
          if [ "${{ needs.get-version.outputs.need_approval }}" = "true" ]; then
            echo "✅ 已确认，开始分发到 Alist 云盘"
          else
            echo "🚀 手动触发，直接开始分发到 Alist 云盘"
          fi
          echo "📦 版本: ${{ needs.get-version.outputs.distribute_tag }}"
          echo "🔔 触发源: ${{ needs.get-version.outputs.source }}"

      - name: Distribute to Cloud Drives via Alist
        env:
          ALIST_URL: ${{ secrets.ALIST_URL }}
          ALIST_USERNAME: ${{ secrets.ALIST_USERNAME }}
          ALIST_PASSWORD: ${{ secrets.ALIST_PASSWORD }}
          DISTRIBUTE_TAG: ${{ needs.get-version.outputs.distribute_tag }}
        run: |
          echo "Installing dependencies..."
          pip install requests
          echo "Running Alist internal distribution script for tag: $DISTRIBUTE_TAG"
          python tools/ci/sync_with_alist.py